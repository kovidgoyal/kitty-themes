## blurb: Get back to school with this chalkboard theme! With this theme, you can finally live your dreams of being able to write your commands on the chalkboard! Oh, and the chalk now has colors! (Fonts not included.)

#: The basic colors

foreground                      #bfbfbf
background                      #0b230a
selection_foreground            #0b230a
selection_background            #bfbfbf


#: Cursor colors

cursor                          #a3a3a3
cursor_text_color               #0b230a
cursor_trail_color              none


#: URL underline color when hovering with mouse

url_color                       #dddddd


#: kitty window border colors and terminal bell colors

active_border_color             #dddddd
inactive_border_color           #194f17
bell_border_color               #d3ca76
visual_bell_color               none


#: OS Window titlebar colors

wayland_titlebar_color          system
macos_titlebar_color            system


#: Tab bar colors

active_tab_foreground           #0b230a
active_tab_background           #bfbfbf
inactive_tab_foreground         #bfbfbf
inactive_tab_background         #256d23
tab_bar_background              #174715
tab_bar_margin_color            none


#: Colors for marks (marked text in the terminal)

mark1_foreground #bfbfbf
mark1_background #515151
mark2_foreground #bfbfbf
mark2_background #824b27
mark3_foreground #bfbfbf
mark3_background #476e75


#: The basic 16 colors

#: black
color0 #174715
color8 #21631e

#: red
color1 #fca4a4
color9 #fcc2c2

#: green
color2  #9bfc94
color10 #bcfcb8

#: yellow
color3  #fcf45f
color11 #fcf797

#: blue
color4  #6384f9
color12 #8aa3fc

#: magenta
color5  #f771fc
color13 #f99ffc

#: cyan
color6  #7ee9fc
color14 #a9effc

#: white
color7  #bfbfbf
color15 #dddddd


#: You can set the remaining 240 colors as color16 to color255.
